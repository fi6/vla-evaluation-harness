name: vla-eval-oft
# OpenVLA-OFT model server + LIBERO benchmark — combined stack.
#
# Full eval (oft waits to load, then libero starts automatically):
#   docker compose -f docker/model_servers/docker-compose.oft.yaml up
#
# Model server only (run the benchmark separately on the host):
#   docker compose -f docker/model_servers/docker-compose.oft.yaml up oft-server

services:
  oft-server:
    image: ghcr.io/allenai/vla-evaluation-harness/model-server-oft:local
    build:
      context: ../..
      dockerfile: docker/model_servers/Dockerfile.oft
    ports:
      - "8000:8000"
    command:
      # --pretrained_checkpoint and --unnorm_key are set by the entrypoint
      # (auto-detects the libero-10 snapshot path after preflight download).
      - --num_images_in_input
      - "2"
      - --chunk_size
      - "8"
      - --port
      - "8000"
    environment:
      HF_ENDPOINT: "${HF_ENDPOINT:-https://huggingface.co}"
    volumes:
      # Use ${HOME} instead of ~ — under snap-installed Docker, ~ expands
      # to ~/snap/docker/... (a confined path with an empty cache).
      # ${HOME} is resolved from the shell environment and always points
      # to the real home directory.
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/.triton:/root/.triton
      - ../../results:/workspace/results
      - ./entrypoint_oft.sh:/workspace/docker/model_servers/entrypoint_oft.sh:ro
    # Cold-start budget — see Dockerfile.openvla for rationale.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/config"]
      interval: 15s
      timeout: 10s
      retries: 240
      start_period: 600s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  libero:
    image: ghcr.io/allenai/vla-evaluation-harness/libero:local
    depends_on:
      oft-server:
        condition: service_healthy
    command:
      - run
      - --config
      - /workspace/configs/benchmarks/libero/video_oft.yaml
      - --server-url
      - ws://oft-server:8000
      - -y
    volumes:
      - ../../results:/workspace/results
      # Bind-mount configs so newly added benchmark YAMLs are picked up
      # without rebuilding the libero image.
      - ../../configs:/workspace/configs:ro
    # MuJoCo's EGL renderer needs the NVIDIA GPU's `graphics` capability;
    # compose's default `gpu` only enables compute+utility, which segfaults
    # robosuite during env reset.
    environment:
      NVIDIA_DRIVER_CAPABILITIES: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu, graphics, utility, compute]
