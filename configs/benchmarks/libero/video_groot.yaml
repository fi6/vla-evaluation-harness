server:
  url: "ws://localhost:8000"
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest
output_dir: "./results"
benchmarks:
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_10_video_groot
    episodes_per_task: 10
    params:
      suite: libero_10
      seed: 7
      num_steps_wait: 10
      recording:
        output_dir: /workspace/results/videos/groot
        max_success: 10
        max_fail: 10
