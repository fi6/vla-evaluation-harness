# MolmoBot model server + LIBERO benchmark — combined stack.
#
# Full eval (molmobot waits to load, then libero starts automatically):
#   docker compose -f docker/model_servers/docker-compose.molmobot.yaml up
#
# Model server only (run the benchmark separately on the host):
#   docker compose -f docker/model_servers/docker-compose.molmobot.yaml up molmobot-server
#
# NOTE: MolmoBot is natively designed for DROID (7-DOF joint-space control, 8D actions).
# LIBERO expects 7D EEF-delta actions, so episodes will fail on action dimension mismatch.
# This compose is useful for testing the connection layer (WebSocket handshake, HELLO, etc.)

services:
  molmobot-server:
    image: ghcr.io/allenai/vla-evaluation-harness/model-server-molmobot:local
    build:
      context: ../..
      dockerfile: docker/model_servers/Dockerfile.molmobot
    ports:
      - "8000:8000"
    command:
      - --hf_repo
      - allenai/MolmoBot-DROID
      - --execute_horizon
      - "8"
      - --states_mode
      - cross_attn
      - --max_joint_delta
      - "0.2"
      # LIBERO provides images under "agentview" and "wrist" keys (not DROID's exo_camera_1/wrist_camera)
      - --primary_image_key
      - agentview
      - --wrist_image_key
      - wrist
      - --port
      - "8000"
    environment:
      # Optional HuggingFace mirror, e.g. https://hf-mirror.com
      HF_ENDPOINT: "${HF_ENDPOINT:-https://huggingface.co}"
    volumes:
      # Mount only the HF model cache, not the entire ~/.cache.
      # Mounting ~/.cache would shadow the uv environment baked into the image,
      # forcing a re-install from PyPI on every start.
      - ~/.cache/huggingface:/root/.cache/huggingface
      # Persist triton kernel cache across restarts (first inference compiles kernels).
      - ~/.triton:/root/.triton
    # The HTTP /config endpoint becomes available once the model is fully loaded.
    # libero waits for this before starting.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/config"]
      interval: 10s
      timeout: 5s
      retries: 36
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  libero:
    image: ghcr.io/allenai/vla-evaluation-harness/libero:local
    depends_on:
      molmobot-server:
        condition: service_healthy
    # Entrypoint is already `conda run -n libero vla-eval`; override only the args.
    # --server-url points to the molmobot-server service on the compose network.
    # _inside_docker() is True here so vla-eval skips the Docker wrapper automatically.
    command:
      - run
      - --config
      - /workspace/configs/libero_10.yaml
      - --server-url
      - ws://molmobot-server:8000
      - -y
    volumes:
      - ../../results:/workspace/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
