name: vla-eval-molmoact
# MolmoAct model server + LIBERO benchmark — combined stack.
#
# Full eval (molmoact waits to load, then libero starts automatically):
#   docker compose -f docker/model_servers/docker-compose.molmoact.yaml up
#
# Model server only (run the benchmark separately on the host):
#   docker compose -f docker/model_servers/docker-compose.molmoact.yaml up molmoact-server

services:
  molmoact-server:
    image: ghcr.io/allenai/vla-evaluation-harness/model-server-molmoact:local
    build:
      context: ../..
      dockerfile: docker/model_servers/Dockerfile.molmoact
    ports:
      - "8000:8000"
    command:
      - --unnorm_key
      - molmoact
      - --chunk_size
      - "8"
      - --port
      - "8000"
    environment:
      # Optional HuggingFace mirror, e.g. https://hf-mirror.com
      HF_ENDPOINT: "${HF_ENDPOINT:-https://huggingface.co}"
    volumes:
      # Mount only the HF model cache, not the entire ~/.cache.
      # Mounting ~/.cache would shadow the uv environment baked into the image,
      # forcing a re-install from PyPI on every start.
      - ~/.cache/huggingface:/root/.cache/huggingface
      # Persist triton kernel cache across restarts (first inference compiles ~15-30 min).
      - ~/.triton:/root/.triton
    # The HTTP /config endpoint becomes available once the model is fully loaded.
    # libero waits for this before starting.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/config"]
      interval: 10s
      timeout: 5s
      retries: 36
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  libero:
    image: ghcr.io/allenai/vla-evaluation-harness/libero:local
    depends_on:
      molmoact-server:
        condition: service_healthy
    # Entrypoint is already `conda run -n libero vla-eval`; override only the args.
    # --server-url points to the molmoact-server service on the compose network.
    # _inside_docker() is True here so vla-eval skips the Docker wrapper automatically.
    command:
      - run
      - --config
      - /workspace/configs/benchmarks/libero/quick.yaml
      - --server-url
      - ws://molmoact-server:8000
      - -y
    volumes:
      - ../../results:/workspace/results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
