name: vla-eval-pi0
# π₀ model server + LIBERO benchmark — combined stack.
#
# Full eval (pi0 waits to load, then libero starts automatically):
#   docker compose -f docker/model_servers/docker-compose.pi0.yaml up
#
# Model server only (run the benchmark separately on the host):
#   docker compose -f docker/model_servers/docker-compose.pi0.yaml up pi0-server

services:
  pi0-server:
    image: ghcr.io/allenai/vla-evaluation-harness/model-server-pi0:local
    build:
      context: ../..
      dockerfile: docker/model_servers/Dockerfile.pi0
    ports:
      - "8000:8000"
    command:
      - --config_name
      - pi05_libero
      - --image_key
      - observation/image
      - --wrist_image_key
      - observation/wrist_image
      - --state_key
      - observation/state
      - --state_dim
      - "8"
      - --image_resolution
      - "224"
      - --chunk_size
      - "10"
      - --port
      - "8000"
    environment:
      # Prevent JAX from pre-allocating the entire GPU memory pool at import time.
      XLA_PYTHON_CLIENT_PREALLOCATE: "false"
      # Optional HuggingFace mirror, e.g. https://hf-mirror.com
      HF_ENDPOINT: "${HF_ENDPOINT:-https://huggingface.co}"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      # Persist openpi GCS checkpoint cache across restarts (pi05_libero is ~4 GB).
      - ~/.cache/openpi:/root/.cache/openpi
      - ../../results:/workspace/results
    # The HTTP /config endpoint becomes available once the model is fully loaded.
    # libero waits for this before starting.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/config"]
      interval: 10s
      timeout: 5s
      retries: 36
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  libero:
    image: ghcr.io/allenai/vla-evaluation-harness/libero:local
    depends_on:
      pi0-server:
        condition: service_healthy
    # Entrypoint is already `conda run -n libero vla-eval`; override only the args.
    # --server-url points to the pi0-server service on the compose network.
    # _inside_docker() is True here so vla-eval skips the Docker wrapper automatically.
    command:
      - run
      - --config
      - /workspace/configs/benchmarks/libero/video_pi0.yaml
      - --server-url
      - ws://pi0-server:8000
      - -y
    volumes:
      - ../../results:/workspace/results
      - ../../configs:/workspace/configs:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
