# LIBERO-10 quick recording test — 3 episodes per task, video saved to results/videos.
# Use this config to verify video recording works before committing to a full run.
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_10_video
    episodes_per_task: 3
    params:
      suite: libero_10
      seed: 7
      num_steps_wait: 10
      recording:
        output_dir: /workspace/results/videos
        max_success: 10
        max_fail: 10
